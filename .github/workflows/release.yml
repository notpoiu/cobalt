name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-script:
    name: Bundle Script
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup RoKit
        uses: CompeyDev/setup-rokit@v0.1.2

      - name: Install Necessary Tools
        run: |
          rokit trust rojo-rbx/rojo
          rokit trust lune-org/lune
          rokit trust seaofvoices/darklua
          rokit install

      - name: Bundle
        run: lune run Build bundle header=Build/Header.luau ci-mode=true

      - name: Prepare Release File
        run: |
          cp Distribution/Script.luau Distribution/Cobalt.luau

      - name: Upload Minified Script to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          gh release upload "$RELEASE_TAG" "Distribution/Cobalt.luau" --clobber

      - name: Upload Minified Script to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Cobalt.luau
          path: Distribution/Cobalt.luau
